name: Deploy Docker Image to ECR

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering

# OIDC permissions for keyless authentication
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # OIDC/IRSA Authentication - No more access keys!
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: "arn:aws:iam::993168274789:role/Github-Actions-ECR-Full-Access"
        role-session-name: GitHubActions-Backend-${{ github.run_id }}
        aws-region: "us-east-1"

    # ... previous setup steps ...

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: drink-voting-app/production        # Replace with your ECR repo name
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f AWS/Deploy-Drink-Voting-Website/Code/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG AWS/Deploy-Drink-Voting-Website/Code/
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    #- name: Update ECS Service
   #   run: |
      #  aws ecs update-service \
        #  --cluster your-cluster-name \
         # --service your-service-name \
         # --force-new-deployment \
         # --region us-east-1

       #   --delete \
          --exclude ".git/*" \
          --exclude ".github/*" \
          --exclude "README.md" 
